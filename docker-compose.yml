services:
  api:
    build:
      context: ./backend/VehicleExplorer
      dockerfile: VehicleExplorer.Api/Dockerfile
    image: vehicle-explorer-api:latest
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      WebDomain: ${WEB_DOMAIN:-http://localhost:4200}
    ports:
      - "${API_PORT:-8080}:8080"
    networks:
      - vehicle-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ./frontend/vehicle-explorer
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
    image: vehicle-explorer-web:latest
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-4200}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - vehicle-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  vehicle-net:
    driver: bridge

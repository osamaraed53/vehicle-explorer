@if (store.makesError(); as error) {
  <div class="mb-6">
    {{ error }}
  </div>
}

<form
  class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm sm:p-6"
  (submit)="$event.preventDefault(); onSearch()"
>
  <div class="grid grid-cols-1 gap-5 md:grid-cols-12">
    <!-- Make -->
    <div class="md:col-span-5">
      <app-searchable-select
        inputId="make"
        label="Make"
        placeholder="Search makes (e.g. Toyota)…"
        [items]="store.makes()"
        [allItemsCount]="store.makesCount()"
        [displayWith]="makeLabel"
        [selected]="store.selectedMake()"
        [loading]="store.makesLoading()"
        [disabled]="store.makesLoading() && store.makes().length === 0"
        (selectionChange)="onMakeSelected($event)"
        (searchChange)="onMakeSearch($event)"
      />
    </div>

    <div class="md:col-span-3">
      <label for="year" class="mb-1.5 block text-sm font-medium text-slate-700"
        >Model year</label
      >
      <select
        id="year"
        (change)="onYearChange($any($event.target).value)"
        class="w-full rounded-lg border border-slate-300 bg-white py-2.5 pl-3.5 pr-9 text-sm text-slate-900 shadow-sm transition focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-200"
      >
        <option value="" [selected]="store.selectedYear() === null">
          Select year
        </option>
        @for (year of store.availableYears; track year) {
          <option [value]="year" [selected]="year === store.selectedYear()">
            {{ year }}
          </option>
        }
      </select>
    </div>

    <div class="md:col-span-4">
      <label
        for="vehicle-type"
        class="mb-1.5 block text-sm font-medium text-slate-700"
      >
        Vehicle type
        <span class="font-normal text-slate-400">(optional)</span>
      </label>
      <select
        id="vehicle-type"
        [disabled]="
          !store.selectedMake() ||
          store.vehicleTypesLoading() ||
          store.vehicleTypes().length === 0
        "
        (change)="onVehicleTypeChange($any($event.target).value)"
        class="w-full rounded-lg border border-slate-300 bg-white py-2.5 pl-3.5 pr-9 text-sm text-slate-900 shadow-sm transition focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-200 disabled:cursor-not-allowed disabled:bg-slate-100 disabled:text-slate-400"
      >
        <option value="" [selected]="store.selectedVehicleType() === null">
          All vehicle types
        </option>
        @for (type of store.vehicleTypes(); track type.id) {
          <option
            [value]="type.id"
            [selected]="type.id === store.selectedVehicleType()?.id"
          >
            {{ type.name }}
          </option>
        }
      </select>
    </div>
  </div>

  <div class="mt-5 flex items-center justify-end">
    <button
      type="submit"
      [disabled]="!store.canSearch() || store.modelsLoading()"
      class="inline-flex items-center justify-center gap-2 rounded-lg bg-brand-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-brand-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-300 disabled:cursor-not-allowed disabled:bg-slate-300"
    >
      <svg
        class="h-4 w-4"
        viewBox="0 0 20 20"
        fill="currentColor"
        aria-hidden="true"
      >
        <path
          fill-rule="evenodd"
          d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.45 4.39l3.08 3.08a1 1 0 01-1.42 1.42l-3.08-3.08A7 7 0 012 9z"
          clip-rule="evenodd"
        />
      </svg>
      Search models
    </button>
  </div>
</form>

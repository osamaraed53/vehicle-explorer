<div
  class="flex items-start gap-3 rounded-lg border border-red-200 bg-red-50 p-4 text-sm text-red-800"
  role="alert"
>
  <svg
    class="mt-0.5 h-5 w-5 flex-none text-red-500"
    viewBox="0 0 20 20"
    fill="currentColor"
    aria-hidden="true"
  >
    <path
      fill-rule="evenodd"
      d="M18 10A8 8 0 11 2 10a8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
      clip-rule="evenodd"
    />
  </svg>
  <div class="flex-1">
    <p class="font-medium">{{ message() }}</p>
  </div>
  @if (retryable()) {
    <button
      type="button"
      class="flex-none rounded-md border border-red-300 bg-white px-3 py-1 text-xs font-semibold text-red-700 transition hover:bg-red-100 focus:outline-none focus-visible:ring-2 focus-visible:ring-red-400"
      (click)="retry.emit()"
    >
      Retry
    </button>
  }
</div>
